<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>CGPA Calculator</h1>
         <button
                type="button"
                id="themeBtn"
                onclick="toggleTheme()">
                🌙 Dark Mode
        </button>

        <form>
            <label>Subject Name</label>
            <input
                type="text"
                id="subject"
                placeholder="Enter subject"
            >

            <label>Grade</label>
            <select id="grade">
                <option>S</option>
                <option>A+</option>
                <option>A</option>
                <option>B+</option>
                <option>B</option>
                <option>C</option>
                <option>P</option>
                <option>F</option>
            </select>

            <label>Credits</label>
            <input
                type="number"
                id="credit"
                placeholder="Enter credits"
            >

            <button
                type="button"
                onclick="addSubject()"
            >
                Add Subject
            </button>

            <button
                type="button"
                onclick="calculateCGPA()"
            >
                Calculate CGPA
            </button>

            <div id="subjectList"></div>

            <h3 id="result"></h3>

            <hr>

            <h2>Semester Records</h2>

            <input
                type="text"
                id="semesterName"
                placeholder="Semester 1"
            >

            <button
                type="button"
                onclick="saveSemester()"
            >
                Save Semester
            </button>

            <div id="semesterList"></div>
            <br>

            <button
                     type="button"
                     onclick="calculateOverallCGPA()">
                     Calculate Overall CGPA
            </button>

            <h2 id="overallCGPA"></h2>
            <button
                  type="button"
                  onclick="calculatePercentage()">

                  Calculate Percentage

            </button>

            <h2 id="percentageResult"></h2>
            <h2 id="academicStanding"></h2>

            <h2>Academic Dashboard</h2>

            <div class="dashboard">

                <div class="dashboard-card">
                    <h3>Overall CGPA</h3>
                    <p id="dashboardCGPA">0.00</p>
                </div>

                <div class="dashboard-card">
                    <h3>Highest SGPA</h3>
                    <p id="highestSGPA">0.00</p>
                </div>

                <div class="dashboard-card">
                    <h3>Lowest SGPA</h3>
                    <p id="lowestSGPA">0.00</p>
                </div>

                <div class="dashboard-card">
                    <h3>Total Semesters</h3>
                    <p id="totalSemesters">0</p>
                </div>

                <div class="dashboard-card">
                    <h3>Percentage</h3>
                    <p id="dashboardPercentage">0%</p>
                </div>

                </div>

            <h2>Performance Chart</h2>

            <canvas id="cgpaChart"></canvas>
            <button
                type="button"
                onclick="downloadPDF()">
                📄 Download PDF Report
            </button>
        </form>
    </div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
