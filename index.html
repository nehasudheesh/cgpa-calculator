<!DOCTYPE html>
<html>

<head>
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>CGPA Calculator</h1>

        <form>

            <label>Subject Name</label>
            <input type="text" id="subject" placeholder="Enter subject">

            <label>Grade</label>
            <select id="grade">
                <option>A+</option>
                <option>A</option>
                <option>B+</option>
                <option>B</option>
                <option>C</option>
                <option>P</option>
                <option>F</option>
            </select>

            <label>Credits</label>
            <input type="number" id="credit" placeholder="Enter credits">

            <button type="button" onclick="calculateCGPA()">
                Calculate CGPA
            </button>
            <h3 id="result"></h3>
        </form>

    </div>
 <script src="script.js"></script>
</body>

</html>
