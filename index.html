<!DOCTYPE html>
<html>

<head>
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>CGPA Calculator</h1>

        <form>

            <label>Subject Name</label>
            <input type="text" placeholder="Enter subject">

            <label>Grade</label>
            <select>
                <option>A+</option>
                <option>A</option>
                <option>B+</option>
                <option>B</option>
                <option>C</option>
                <option>P</option>
                <option>F</option>
            </select>

            <label>Credits</label>
            <input type="number" placeholder="Enter credits">

            <button type="button">
                Calculate CGPA
            </button>

        </form>

    </div>

</body>

</html>
